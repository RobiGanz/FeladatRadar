<!DOCTYPE html>
<html lang="hu">
<head>
<meta charset="UTF-8">
<title>FeladatRadar – ER Diagram</title>
<link rel="stylesheet" href="er_diagram.css">
</head>
<body>
<div id="vp"><div id="canvas"><svg id="lines"></svg></div></div>

<div id="legend">
  <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:4px">
    <b>FeladatRadar – ER Diagram</b>
    <button onclick="toggleLegend()" style="background:none;border:none;color:#6b7280;cursor:pointer;font-size:13px;padding:0 0 0 10px;line-height:1" title="Elrejt">✕</button>
  </div>
  <div id="legend-body">
  <div class="ld"><div class="dot" style="background:#3b82f6"></div> Felhasználók</div>
  <div class="ld"><div class="dot" style="background:#10b981"></div> Csoportok</div>
  <div class="ld"><div class="dot" style="background:#8b5cf6"></div> Szavazások</div>
  <div class="ld"><div class="dot" style="background:#f59e0b"></div> Tantárgyak / Feladatok</div>
  <div class="ld"><div class="dot" style="background:#6b7280"></div> Rendszer</div>
  <hr style="border-color:#21262d;margin:4px 0">
  <div class="ld"><div class="lline" style="background:#60a5fa"></div> FK kapcsolat</div>
  <div class="ld"><div class="lline" style="background:#f87171;background:repeating-linear-gradient(90deg,#f87171 0,#f87171 4px,transparent 4px,transparent 7px)"></div> ON DELETE CASCADE</div>
  <div style="margin-top:5px;font-size:9px;color:#3d4451">Görgetés → nagyítás &nbsp;|&nbsp; Húzás → mozgatás<br>Egér a vonalra → kapcsolat neve</div>
  </div>
</div>
<button id="legend-toggle" onclick="toggleLegend()">☰ Jelmagyarázat</button>

<div id="ui">
  <button class="btn" onclick="fitView()">⊡ Igazítás</button>
  <button class="btn" onclick="resetView()">↺ Alaphelyzet</button>
  <button class="btn" onclick="adjustZoom(.12)">＋ Nagyítás</button>
  <button class="btn" onclick="adjustZoom(-.12)">－ Kicsinyítés</button>
</div>
<div id="zd">100%</div>
<div id="tip"></div>

<script>
const TW=242, HH=32, RH=21, GAP=20;
const h=n=>HH+n*RH+6;

// ── Tábladefiníciók ─────────────────────────────────────────
const T = [
  // 0. oszlop  x=30
  {id:'Users',     dm:'core', x:30,  y:20,
   cols:[{n:'UserID',t:'int',pk:1},{n:'Username',t:'nvarchar(50)',uk:1},{n:'PasswordHash',t:'nvarchar(255)'},
         {n:'Email',t:'nvarchar(100)'},{n:'FirstName',t:'nvarchar(50)'},{n:'LastName',t:'nvarchar(50)'},
         {n:'UserRole',t:'nvarchar(20)'},{n:'CreatedAt',t:'datetime'},{n:'IsActive',t:'bit'}]},
  {id:'AuditLog',  dm:'sys',  x:30,  y:20+h(9)+GAP,
   cols:[{n:'LogID',t:'int',pk:1},{n:'UserID',t:'int',fk:1},{n:'Username',t:'nvarchar(50)'},
         {n:'Action',t:'nvarchar(200)'},{n:'Details',t:'nvarchar(max)'},{n:'CreatedAt',t:'datetime'}]},

  // 1. oszlop  x=450
  {id:'Groups',    dm:'grp',  x:450, y:20,
   cols:[{n:'GroupID',t:'int',pk:1},{n:'GroupName',t:'nvarchar(100)'},{n:'CreatedBy',t:'int',fk:1},{n:'CreatedAt',t:'datetime'}]},
  {id:'GroupMembers',dm:'grp',x:450, y:20+h(4)+GAP,
   cols:[{n:'GroupID',t:'int',pk:1,fk:1},{n:'StudentID',t:'int',pk:1,fk:1},{n:'JoinedAt',t:'datetime'}]},
  {id:'GroupInvites',dm:'grp',x:450, y:20+h(4)+GAP+h(3)+GAP,
   cols:[{n:'InviteID',t:'int',pk:1},{n:'GroupID',t:'int',fk:1},{n:'InvitedEmail',t:'nvarchar(200)'},
         {n:'InvitedBy',t:'int',fk:1},{n:'IsAccepted',t:'bit'},{n:'CreatedAt',t:'datetime'},{n:'Status',t:'nvarchar(20)'}]},
  {id:'GroupTasks',dm:'grp',  x:450, y:20+h(4)+GAP+h(3)+GAP+h(7)+GAP,
   cols:[{n:'TaskID',t:'int',pk:1},{n:'GroupID',t:'int',fk:1},{n:'AddedBy',t:'int',fk:1},{n:'SubjectID',t:'int',fk:1},
         {n:'Title',t:'nvarchar(200)'},{n:'Description',t:'nvarchar(1000)'},{n:'DueDate',t:'datetime'},
         {n:'TaskType',t:'nvarchar(50)'},{n:'IsCompleted',t:'bit'},{n:'CreatedAt',t:'datetime'}]},
  {id:'GroupScheduleEntries',dm:'grp',x:450,y:20+h(4)+GAP+h(3)+GAP+h(7)+GAP+h(10)+GAP,
   cols:[{n:'EntryID',t:'int',pk:1},{n:'GroupID',t:'int',fk:1},{n:'AddedBy',t:'int',fk:1},{n:'SubjectID',t:'int',fk:1},
         {n:'DayOfWeek',t:'int'},{n:'StartTime',t:'time'},{n:'EndTime',t:'time'},{n:'Location',t:'nvarchar(100)'},
         {n:'CreatedAt',t:'datetime'},{n:'RecurrenceType',t:'nvarchar(20)'},{n:'RecurrenceEndDate',t:'date'},{n:'StartDate',t:'date'}]},
  {id:'TeacherExams',dm:'grp',x:450,y:20+h(4)+GAP+h(3)+GAP+h(7)+GAP+h(10)+GAP+h(12)+GAP,
   cols:[{n:'ExamID',t:'int',pk:1},{n:'GroupID',t:'int',fk:1},{n:'CreatedBy',t:'int',fk:1},
         {n:'Title',t:'nvarchar(200)'},{n:'Description',t:'nvarchar(1000)'},{n:'ExamDate',t:'datetime2'},
         {n:'SubjectName',t:'nvarchar(100)'},{n:'CreatedAt',t:'datetime2'}]},

  // 2. oszlop  x=870
  {id:'Subjects',  dm:'subj', x:870, y:20,
   cols:[{n:'SubjectID',t:'int',pk:1},{n:'SubjectName',t:'nvarchar(100)'},{n:'SubjectCode',t:'nvarchar(20)'},
         {n:'TeacherID',t:'int',fk:1},{n:'IsActive',t:'bit'},{n:'CurrentEnrollment',t:'int'},
         {n:'CreatedBy',t:'int'},{n:'IsPrivate',t:'bit'}]},
  {id:'StudentSubjects',dm:'subj',x:870,y:20+h(8)+GAP,
   cols:[{n:'StudentSubjectID',t:'int',pk:1},{n:'StudentID',t:'int',fk:1},{n:'SubjectID',t:'int',fk:1}]},
  {id:'Enrollments',dm:'subj',x:870,y:20+h(8)+GAP+h(3)+GAP,
   cols:[{n:'EnrollmentID',t:'int',pk:1},{n:'StudentID',t:'int'},{n:'SubjectID',t:'int',fk:1},{n:'EnrolledAt',t:'datetime'}]},
  {id:'Polls',     dm:'poll', x:870, y:20+h(8)+GAP+h(3)+GAP+h(4)+GAP,
   cols:[{n:'PollID',t:'int',pk:1},{n:'GroupID',t:'int',fk:1},{n:'CreatedBy',t:'int',fk:1},
         {n:'Question',t:'nvarchar(500)'},{n:'CreatedAt',t:'datetime2'},{n:'ExpiresAt',t:'datetime2'},{n:'IsActive',t:'bit'}]},
  {id:'PollOptions',dm:'poll',x:870,y:20+h(8)+GAP+h(3)+GAP+h(4)+GAP+h(7)+GAP,
   cols:[{n:'OptionID',t:'int',pk:1},{n:'PollID',t:'int',fk:1},{n:'OptionText',t:'nvarchar(200)'},{n:'SortOrder',t:'int'}]},

  // 3. oszlop  x=1290
  {id:'Tasks',     dm:'subj', x:1290, y:20,
   cols:[{n:'TaskID',t:'int',pk:1},{n:'CreatedBy',t:'int',fk:1},{n:'SubjectID',t:'int',fk:1},
         {n:'Title',t:'nvarchar(200)'},{n:'Description',t:'nvarchar(max)'},{n:'DueDate',t:'datetime'},
         {n:'TaskType',t:'nvarchar(50)'},{n:'IsCompleted',t:'bit'},{n:'CreatedAt',t:'datetime'},
         {n:'RecurrenceType',t:'nvarchar(20)'},{n:'RecurrenceEndDate',t:'date'},{n:'ParentTaskID',t:'int',fk:1}]},
  {id:'ScheduleEntries',dm:'subj',x:1290,y:20+h(12)+GAP,
   cols:[{n:'EntryID',t:'int',pk:1},{n:'StudentID',t:'int'},{n:'SubjectID',t:'int',fk:1},
         {n:'DayOfWeek',t:'int'},{n:'StartTime',t:'time'},{n:'EndTime',t:'time'},
         {n:'Location',t:'nvarchar(100)'},{n:'RecurrenceType',t:'nvarchar(20)'},
         {n:'RecurrenceEndDate',t:'date'},{n:'StartDate',t:'date'},{n:'CreatedAt',t:'datetime'}]},
  {id:'PollVotes', dm:'poll', x:1290, y:20+h(12)+GAP+h(11)+GAP,
   cols:[{n:'VoteID',t:'int',pk:1},{n:'PollID',t:'int',fk:1},{n:'OptionID',t:'int',fk:1},
         {n:'UserID',t:'int',fk:1},{n:'VotedAt',t:'datetime2'}]},
  {id:'Exams',     dm:'sys',  x:1290, y:20+h(12)+GAP+h(11)+GAP+h(5)+GAP, dep:1,
   cols:[{n:'ExamID',t:'int',pk:1},{n:'TeacherID',t:'int',fk:1},{n:'SubjectID',t:'int',fk:1},
         {n:'Title',t:'nvarchar(200)'},{n:'ExamDate',t:'datetime'},{n:'Duration',t:'int'},
         {n:'Notes',t:'nvarchar(max)'},{n:'CreatedAt',t:'datetime'}]},
];

// ── FK kapcsolatok [forrás, forrásoszlop, cél, céloszlop, kaszkád, felirat] ──
const C = [
  ['AuditLog','UserID','Users','UserID',0,'AuditLog → Users'],
  ['Groups','CreatedBy','Users','UserID',0,'Groups.CreatedBy → Users'],
  ['GroupMembers','GroupID','Groups','GroupID',0,'GroupMembers → Groups'],
  ['GroupMembers','StudentID','Users','UserID',0,'GroupMembers → Users'],
  ['GroupInvites','GroupID','Groups','GroupID',0,'GroupInvites → Groups'],
  ['GroupInvites','InvitedBy','Users','UserID',0,'GroupInvites.InvitedBy → Users'],
  ['GroupTasks','GroupID','Groups','GroupID',1,'GroupTasks → Groups (CASCADE)'],
  ['GroupTasks','AddedBy','Users','UserID',0,'GroupTasks.AddedBy → Users'],
  ['GroupTasks','SubjectID','Subjects','SubjectID',0,'GroupTasks → Subjects'],
  ['GroupScheduleEntries','GroupID','Groups','GroupID',1,'GroupScheduleEntries → Groups (CASCADE)'],
  ['GroupScheduleEntries','AddedBy','Users','UserID',0,'GroupScheduleEntries.AddedBy → Users'],
  ['GroupScheduleEntries','SubjectID','Subjects','SubjectID',0,'GroupScheduleEntries → Subjects'],
  ['TeacherExams','GroupID','Groups','GroupID',1,'TeacherExams → Groups (CASCADE)'],
  ['TeacherExams','CreatedBy','Users','UserID',0,'TeacherExams.CreatedBy → Users'],
  ['Subjects','TeacherID','Users','UserID',0,'Subjects.TeacherID → Users'],
  ['StudentSubjects','StudentID','Users','UserID',0,'StudentSubjects → Users'],
  ['StudentSubjects','SubjectID','Subjects','SubjectID',0,'StudentSubjects → Subjects'],
  ['Enrollments','SubjectID','Subjects','SubjectID',0,'Enrollments → Subjects'],
  ['Polls','GroupID','Groups','GroupID',1,'Polls → Groups (CASCADE)'],
  ['Polls','CreatedBy','Users','UserID',0,'Polls.CreatedBy → Users'],
  ['PollOptions','PollID','Polls','PollID',1,'PollOptions → Polls (CASCADE)'],
  ['PollVotes','PollID','Polls','PollID',1,'PollVotes → Polls (CASCADE)'],
  ['PollVotes','OptionID','PollOptions','OptionID',0,'PollVotes → PollOptions'],
  ['PollVotes','UserID','Users','UserID',0,'PollVotes → Users'],
  ['Tasks','CreatedBy','Users','UserID',0,'Tasks.CreatedBy → Users'],
  ['Tasks','SubjectID','Subjects','SubjectID',0,'Tasks → Subjects'],
  ['Tasks','ParentTaskID','Tasks','TaskID',0,'Tasks.ParentTaskID → Tasks (self)'],
  ['ScheduleEntries','SubjectID','Subjects','SubjectID',0,'ScheduleEntries → Subjects'],
  ['Exams','TeacherID','Users','UserID',0,'Exams.TeacherID → Users'],
  ['Exams','SubjectID','Subjects','SubjectID',0,'Exams → Subjects'],
];

// ── Táblák térképének felépítése ────────────────────────────────────
const TM={};
T.forEach(t=>TM[t.id]=t);

function ry(tbl,col){
  const i=tbl.cols.findIndex(c=>c.n===col);
  return tbl.y+HH+i*RH+RH/2;
}

// ── Táblák megjelenítése ────────────────────────────────────────
const canvas=document.getElementById('canvas');
T.forEach(tbl=>{
  const el=document.createElement('div');
  el.className=`tbl d-${tbl.dm}${tbl.dep?' dep':''}`;
  el.style.cssText=`left:${tbl.x}px;top:${tbl.y}px`;
  let html=`<div class="th">${tbl.id}${tbl.dep?'<em>DEPRECATED</em>':''}</div>`;
  tbl.cols.forEach(c=>{
    const cls=c.pk?'pk':c.fk?'fk':c.uk?'uk':'';
    const badges=(c.pk?'<span class="bpk">PK</span>':'')+(c.uk?'<span class="buk">UK</span>':'');
    html+=`<div class="cr"><span class="cn ${cls}">${c.n}</span><span class="ct">${c.t}</span>${badges}</div>`;
  });
  el.innerHTML=html;
  canvas.appendChild(el);
});

// Vászon méretének kiszámítása
let cw=0,ch=0;
T.forEach(t=>{cw=Math.max(cw,t.x+TW+30);ch=Math.max(ch,t.y+h(t.cols.length)+30);});
canvas.style.width=cw+'px'; canvas.style.height=ch+'px';
const svg=document.getElementById('lines');
svg.style.width=cw+'px'; svg.style.height=ch+'px';

// ── Kapcsolatok rajzolása ───────────────────────────────────────
svg.innerHTML=`<defs>
  <marker id="ma" markerWidth="7" markerHeight="7" refX="6" refY="3.5" orient="auto"><path d="M1,1 L6,3.5 L1,6" stroke-width="1.2" fill="none" stroke="#60a5fa"/></marker>
  <marker id="mc" markerWidth="7" markerHeight="7" refX="6" refY="3.5" orient="auto"><path d="M1,1 L6,3.5 L1,6" stroke-width="1.2" fill="none" stroke="#f87171"/></marker>
  <marker id="ms" markerWidth="7" markerHeight="7" refX="6" refY="3.5" orient="auto"><path d="M1,1 L6,3.5 L1,6" stroke-width="1.2" fill="none" stroke="#c084fc"/></marker>
</defs>`;

const tip=document.getElementById('tip');

// Előre kiszámítja az azonos cél/forrás oszlopú kapcsolatok számát,
// hogy szét lehessen választani őket és elkerülni az átfedést
const tgtCount={}, srcCount={};
C.forEach(([fid,fc,tid,tc])=>{
  const tk=`${tid}|${tc}`, sk=`${fid}|${fc}`;
  tgtCount[tk]=(tgtCount[tk]||0)+1;
  srcCount[sk]=(srcCount[sk]||0)+1;
});
const tgtCur={}, srcCur={};
Object.keys(tgtCount).forEach(k=>tgtCur[k]=0);
Object.keys(srcCount).forEach(k=>srcCur[k]=0);

C.forEach(([fid,fc,tid,tc,casc,label])=>{
  const ft=TM[fid], tt=TM[tid];
  if(!ft||!tt) return;

  // Azonos végpontú vonalak szétterítése
  const tk=`${tid}|${tc}`, sk=`${fid}|${fc}`;
  const tSpread=(tgtCur[tk]-(tgtCount[tk]-1)/2)*6; tgtCur[tk]++;
  const sSpread=(srcCur[sk]-(srcCount[sk]-1)/2)*6; srcCur[sk]++;

  const fy=ry(ft,fc)+sSpread, ty2=ry(tt,tc)+tSpread;
  const isSelf=fid===tid;
  const color=casc?'#f87171':isSelf?'#c084fc':'#60a5fa';
  const mk=casc?'mc':isSelf?'ms':'ma';
  const dsh=casc?'5,3':'none';

  let d;
  if(isSelf){
    const rx=ft.x+TW;
    d=`M${rx} ${fy} C${rx+90} ${fy} ${rx+90} ${ty2} ${rx} ${ty2}`;
  } else if(ft.x===tt.x){
    const lx=ft.x; const off=Math.abs(fy-ty2)*0.2+60;
    d=`M${lx} ${fy} C${lx-off} ${fy} ${lx-off} ${ty2} ${lx} ${ty2}`;
  } else if(ft.x>tt.x){
    const sx=ft.x, tx2=tt.x+TW;
    const dx=(sx-tx2)*0.4+30;
    d=`M${sx} ${fy} C${sx-dx} ${fy} ${tx2+dx} ${ty2} ${tx2} ${ty2}`;
  } else {
    const sx=ft.x+TW, tx2=tt.x;
    const dx=(tx2-sx)*0.4+30;
    d=`M${sx} ${fy} C${sx+dx} ${fy} ${tx2-dx} ${ty2} ${tx2} ${ty2}`;
  }

  // Láthatatlan vastag kattintható terület
  const hit=document.createElementNS('http://www.w3.org/2000/svg','path');
  hit.setAttribute('d',d); hit.setAttribute('stroke','transparent');
  hit.setAttribute('stroke-width','12'); hit.setAttribute('fill','none');
  hit.style.pointerEvents='stroke'; hit.style.cursor='default';
  hit.addEventListener('mouseenter',e=>{
    tip.style.display='block'; tip.textContent=label;
    vis.setAttribute('stroke-width','3.5'); vis.setAttribute('opacity','1');
  });
  hit.addEventListener('mousemove',e=>{ tip.style.left=(e.clientX+12)+'px'; tip.style.top=(e.clientY-28)+'px'; });
  hit.addEventListener('mouseleave',()=>{ tip.style.display='none'; vis.setAttribute('stroke-width','2'); vis.setAttribute('opacity','0.72'); });

  // Látható vonal – vastagabb és átlátszatlanabb
  const vis=document.createElementNS('http://www.w3.org/2000/svg','path');
  vis.setAttribute('d',d); vis.setAttribute('stroke',color);
  vis.setAttribute('stroke-width','2'); vis.setAttribute('fill','none');
  vis.setAttribute('opacity','0.72'); vis.style.pointerEvents='none';
  if(dsh!=='none') vis.setAttribute('stroke-dasharray',dsh);
  vis.setAttribute('marker-end',`url(#${mk})`);

  svg.appendChild(vis);
  svg.appendChild(hit);
});

// ── Nagyítás és mozgatás ────────────────────────────────────────
let sc=1, tx=0, ty=0, drag=false, sx=0, sy=0, stx=0, sty=0;

function apply(){
  canvas.style.transform=`translate(${tx}px,${ty}px) scale(${sc})`;
  document.getElementById('zd').textContent=Math.round(sc*100)+'%';
}
function adjustZoom(d,cx,cy){
  const vp=document.getElementById('vp');
  const px=cx??vp.clientWidth/2, py=cy??vp.clientHeight/2;
  const ns=Math.max(.15,Math.min(2.5,sc+d)), r=ns/sc;
  tx=px-r*(px-tx); ty=py-r*(py-ty); sc=ns; apply();
}
function resetView(){ sc=1; tx=20; ty=20; apply(); }
function fitView(){
  const vp=document.getElementById('vp');
  const vw=vp.clientWidth-80, vh=vp.clientHeight-60;
  sc=Math.min(vw/cw,vh/ch,1); tx=40; ty=30; apply();
}

document.getElementById('vp').addEventListener('wheel',e=>{
  e.preventDefault(); adjustZoom(e.deltaY<0?.1:-.1,e.clientX,e.clientY);
},{passive:false});

const vp=document.getElementById('vp');
vp.addEventListener('mousedown',e=>{
  if(e.button!==0) return;
  drag=true; sx=e.clientX; sy=e.clientY; stx=tx; sty=ty; vp.classList.add('g');
});
document.addEventListener('mousemove',e=>{ if(!drag) return; tx=stx+e.clientX-sx; ty=sty+e.clientY-sy; apply(); });
document.addEventListener('mouseup',()=>{ drag=false; vp.classList.remove('g'); });

// Érintőképernyő-támogatás
let touches={}, ptDist=null;
vp.addEventListener('touchstart',e=>{
  e.preventDefault();
  if(e.touches.length===1){ const t=e.touches[0]; drag=true; sx=t.clientX; sy=t.clientY; stx=tx; sty=ty; }
  else if(e.touches.length===2){ const a=e.touches[0],b=e.touches[1]; ptDist=Math.hypot(b.clientX-a.clientX,b.clientY-a.clientY); drag=false; }
},{passive:false});
vp.addEventListener('touchmove',e=>{
  e.preventDefault();
  if(e.touches.length===1&&drag){ tx=stx+e.touches[0].clientX-sx; ty=sty+e.touches[0].clientY-sy; apply(); }
  else if(e.touches.length===2&&ptDist){
    const a=e.touches[0],b=e.touches[1];
    const nd=Math.hypot(b.clientX-a.clientX,b.clientY-a.clientY);
    adjustZoom((nd-ptDist)*.005,(a.clientX+b.clientX)/2,(a.clientY+b.clientY)/2);
    ptDist=nd;
  }
},{passive:false});
vp.addEventListener('touchend',()=>{ drag=false; ptDist=null; });

setTimeout(fitView,60);

function toggleLegend(){
  const leg=document.getElementById('legend');
  const btn=document.getElementById('legend-toggle');
  if(leg.style.display==='none'){
    leg.style.display=''; btn.style.display='none';
  } else {
    leg.style.display='none'; btn.style.display='block';
  }
}
</script>
</body>
</html>
